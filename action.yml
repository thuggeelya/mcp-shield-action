name: 'MCP Shield'
description: 'Security scanner for MCP servers — compliance, injection detection, and risk scoring'
author: 'thuggeelya'

branding:
  icon: 'shield'
  color: 'blue'

inputs:
  server:
    description: 'Server command to test (e.g., "node dist/index.js" or "npx -y @modelcontextprotocol/server-memory")'
    required: true
  fail-on:
    description: 'Minimum severity to fail CI: critical, high, medium, low, any'
    required: false
    default: 'high'
  comment:
    description: 'Post scan results as PR comment (true/false)'
    required: false
    default: 'true'
  badge:
    description: 'Generate badge URL in outputs (true/false)'
    required: false
    default: 'true'
  ml:
    description: 'Enable ML-based prompt injection detection (true/false)'
    required: false
    default: 'false'
  sarif:
    description: 'Generate SARIF report for GitHub Code Scanning (true/false)'
    required: false
    default: 'true'
  version:
    description: 'mcp-shield-cli version to install (e.g., "0.1.0" or "latest")'
    required: false
    default: 'latest'

outputs:
  score:
    description: 'Numeric score (0-100)'
    value: ${{ steps.scan.outputs.score }}
  grade:
    description: 'Letter grade (A+ to F)'
    value: ${{ steps.scan.outputs.grade }}
  badge-url:
    description: 'shields.io badge URL'
    value: ${{ steps.scan.outputs.badge-url }}
  report-json:
    description: 'Path to JSON report file'
    value: ${{ steps.scan.outputs.report-json }}
  report-sarif:
    description: 'Path to SARIF report file (for upload-sarif)'
    value: ${{ steps.scan.outputs.report-sarif }}

runs:
  using: 'composite'
  steps:
    - name: Install mcp-shield-cli
      shell: bash
      run: |
        if [ "${{ inputs.version }}" = "latest" ]; then
          pip install mcp-shield-cli
        else
          pip install mcp-shield-cli==${{ inputs.version }}
        fi

    - name: Run scan
      id: scan
      shell: bash
      env:
        INPUT_SERVER: ${{ inputs.server }}
        INPUT_FAIL_ON: ${{ inputs.fail-on }}
        INPUT_ML: ${{ inputs.ml }}
        INPUT_SARIF: ${{ inputs.sarif }}
      run: |
        REPORT="/tmp/mcp-shield-report.json"
        SARIF_REPORT="/tmp/mcp-shield-report.sarif"

        ARGS="--format json --output $REPORT --fail-on $INPUT_FAIL_ON"
        if [ "$INPUT_ML" = "true" ]; then
          ARGS="$ARGS --ml"
        fi
        if [ "$INPUT_SARIF" = "true" ]; then
          ARGS="$ARGS --sarif-output $SARIF_REPORT"
        fi

        EXIT_CODE=0
        mcp-shield test "$INPUT_SERVER" $ARGS || EXIT_CODE=$?

        # Parse JSON report
        SCORE=$(python3 -c "import json; r=json.load(open('$REPORT')); print(r['summary']['score'])")
        GRADE=$(python3 -c "import json; r=json.load(open('$REPORT')); print(r['summary']['grade'])")
        PASSED=$(python3 -c "import json; r=json.load(open('$REPORT')); print(r['summary']['passed'])")
        FAILED=$(python3 -c "import json; r=json.load(open('$REPORT')); print(r['summary']['failed'])")
        WARNINGS=$(python3 -c "import json; r=json.load(open('$REPORT')); print(r['summary']['warnings'])")
        TOTAL=$(python3 -c "import json; r=json.load(open('$REPORT')); print(r['summary']['total'])")
        SERVER_NAME=$(python3 -c "import json; r=json.load(open('$REPORT')); print(r['server'].get('name', 'unknown'))")

        # Score as integer for badge
        SCORE_INT=$(python3 -c "print(int(round($SCORE)))")

        # Badge color by grade
        case "$GRADE" in
          A+|A|A-) COLOR="brightgreen" ;;
          B+|B|B-) COLOR="yellowgreen" ;;
          C+|C)    COLOR="yellow" ;;
          D)       COLOR="orange" ;;
          *)       COLOR="red" ;;
        esac

        BADGE_URL="https://img.shields.io/badge/MCP_Shield-${GRADE}%20(${SCORE_INT})-${COLOR}"

        # Write outputs
        echo "score=$SCORE_INT" >> $GITHUB_OUTPUT
        echo "grade=$GRADE" >> $GITHUB_OUTPUT
        echo "badge-url=$BADGE_URL" >> $GITHUB_OUTPUT
        echo "report-json=$REPORT" >> $GITHUB_OUTPUT
        if [ "$INPUT_SARIF" = "true" ]; then
          echo "report-sarif=$SARIF_REPORT" >> $GITHUB_OUTPUT
        fi

        # Save for comment step
        echo "EXIT_CODE=$EXIT_CODE" >> $GITHUB_ENV
        echo "SCORE=$SCORE_INT" >> $GITHUB_ENV
        echo "GRADE=$GRADE" >> $GITHUB_ENV
        echo "PASSED=$PASSED" >> $GITHUB_ENV
        echo "FAILED=$FAILED" >> $GITHUB_ENV
        echo "WARNINGS=$WARNINGS" >> $GITHUB_ENV
        echo "TOTAL=$TOTAL" >> $GITHUB_ENV
        echo "SERVER_NAME=$SERVER_NAME" >> $GITHUB_ENV
        echo "BADGE_URL=$BADGE_URL" >> $GITHUB_ENV
        echo "REPORT=$REPORT" >> $GITHUB_ENV

    - name: Post PR comment
      if: inputs.comment == 'true' && github.event_name == 'pull_request'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        BODY=$(python3 << 'PYEOF'
        import json, os

        report = json.load(open(os.environ["REPORT"]))

        # GitHub anchor slugs for checks.md headings
        _ANCHORS = {
            "COMP-001": "comp-001--verify-handshake",
            "COMP-002": "comp-002--verify-server-identity",
            "COMP-003": "comp-003--verify-tool-schemas",
            "COMP-004": "comp-004--verify-tool-name-format",
            "COMP-005": "comp-005--verify-ping",
            "COMP-006": "comp-006--verify-tool-descriptions",
            "COMP-007": "comp-007--verify-capabilities-consistency",
            "COMP-008": "comp-008--verify-schema-field-descriptions",
            "COMP-009": "comp-009--verify-schema-constraints",
            "COMP-010": "comp-010--verify-resources-and-prompts",
            "SEC-001": "sec-001--tool-poisoning-scan",
            "SEC-002": "sec-002--injection-vector-analysis",
            "SEC-003": "sec-003--security-score",
            "SEC-004": "sec-004--dangerous-operations",
            "SEC-005": "sec-005--write-scope-analysis",
            "SEC-006": "sec-006--idempotency-risk",
            "SEC-007": "sec-007--costquota-risk",
            "ADV-001": "adv-001--auth-requirement-hints",
            "ADV-002": "adv-002--external-service-dependencies",
            "ADV-003": "adv-003--bulk-operation-warning",
            "ADV-004": "adv-004--sensitive-data-exposure-hints",
            "ADV-005": "adv-005--external-network-access",
        }

        score = os.environ["SCORE"]
        grade = os.environ["GRADE"]
        total = os.environ["TOTAL"]
        passed = os.environ["PASSED"]
        failed = os.environ["FAILED"]
        warnings = os.environ["WARNINGS"]
        badge_url = os.environ["BADGE_URL"]

        lines = []
        lines.append("## MCP Shield Report\n")
        lines.append(f"**Score: {score}/100 (Grade: {grade})**")
        lines.append(f"Checks: {total} | Passed: {passed} | Failed: {failed} | Warnings: {warnings}\n")

        # Collect FAIL/WARN results with details
        findings = [r for r in report["results"] if r["outcome"] in ("fail", "warn")]

        if findings:
            lines.append("### Findings\n")
            for f in findings:
                icon = "❌" if f["outcome"] == "fail" else "⚠️"
                check_id = f["check_id"]
                cwe = f.get("metadata", {}).get("cwe_ids", [])
                cwe_str = f' ({", ".join(cwe)})' if cwe else ""
                anchor = _ANCHORS.get(check_id, check_id.lower())
                check_url = f"https://github.com/thuggeelya/mcp-shield/blob/main/docs/checks.md#{anchor}"

                lines.append(f"#### {icon} [{check_id}]({check_url}) {f['outcome'].upper()} — {f['message']}{cwe_str}\n")

                # Show details (specific tools/fields affected)
                details = f.get("details", [])
                if details:
                    # Show up to 10 detail lines
                    for d in details[:10]:
                        lines.append(f"- `{d.strip()}`")
                    if len(details) > 10:
                        lines.append(f"- ... and {len(details) - 10} more")
                    lines.append("")

        # Recommendations
        recs = report.get("recommendations", {}).get("items", [])
        if recs:
            lines.append("### Recommendations\n")
            for rec in recs:
                prio = rec.get("priority", "")
                prio_icon = {"high": "🔴", "medium": "🟡", "low": "🔵"}.get(prio, "")
                lines.append(f"**{prio_icon} {rec['title']}**")
                lines.append(f"> {rec['action']}")
                tools = rec.get("tools", [])
                if tools:
                    tool_list = ", ".join(f"`{t}`" for t in tools[:8])
                    if len(tools) > 8:
                        tool_list += f", ... +{len(tools) - 8} more"
                    lines.append(f"> Affected: {tool_list}")
                lines.append("")

        lines.append("---")
        lines.append(f"[![MCP Shield]({badge_url})](https://github.com/thuggeelya/mcp-shield)")
        lines.append(f'<sub>Scanned with [mcp-shield-cli](https://pypi.org/project/mcp-shield-cli/) · [Check reference](https://github.com/thuggeelya/mcp-shield/blob/main/docs/checks.md)</sub>')

        print("\n".join(lines))
        PYEOF
        )

        gh pr comment ${{ github.event.pull_request.number }} --body "$BODY"

    - name: Upload SARIF to GitHub Security
      if: inputs.sarif == 'true'
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: /tmp/mcp-shield-report.sarif
      continue-on-error: true

    - name: Exit with scan result
      shell: bash
      run: exit ${{ env.EXIT_CODE }}
